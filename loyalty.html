<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كسب النقاط | مدى</title>
   <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* عدلنا الخلفية عشان تاخذ لون الهوية الجديد */
        body { background: var(#c1d6ab, #c1d6ab); font-family: 'Cairo'; padding: 50px 20px; }
        .loyalty-box { max-width: 450px; margin: auto; background: white; padding: 40px; border-radius: 20px; text-align: center; border-top: 5px solid var(--forest-green); box-shadow: 0 10px 30px rgba(0,0,0,0.08);}
        .loyalty-box h2 { color: var(--brunswick-green); font-size: 2rem; margin-bottom: 10px; }
        .input-style { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; font-size: 1.1rem; box-sizing: border-box; }
        .nav-btn { display: inline-block; margin-top: 25px; padding: 10px 20px; background: transparent; border: 2px solid var(--vivid-red); color: var(--vivid-red); border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .nav-btn:hover { background: var(--vivid-red); color: white; }
    </style>
</head>
<body>
    <div class="loyalty-box">
        <!-- إضافة لوجو مدى هنا بشكل أنيق -->
        <img src="images/Mada_logo.png" alt="شعار مدى" style="max-height: 80px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(163, 192, 143, 0.2));">
        
        <h2 style="margin-top: 0;"> شكراً لتسوقك!</h2>
        <p style="color: #666; margin-bottom: 30px;">أدخل رقم جوالك والرمز الموجود أسفل الفاتورة لكسب نقاط.</p>
        
        <input type="text" id="phoneAdd" placeholder="رقم الجوال (مثال: 055...)" class="input-style" required>
        <input type="text" id="receiptCode" placeholder="رمز الفاتورة (مثال: 9988)" class="input-style" required>
        
        <button id="btnAddPoints" class="btn-primary" style="width:100%; font-size: 1.2rem; padding: 15px; background: var(--forest-green); border: none; border-radius: 12px; color: white; cursor: pointer;">إضافة النقاط لرصيدي <i class="fas fa-star" style="color: #FFD700;"></i></button>
        <p id="msgAdd" style="margin-top: 15px; font-weight: bold; font-size: 1.1rem;"></p>
        
        <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
        <p style="margin-bottom: 10px; font-weight: bold; color: var(--brunswick-green);">تبي تشوف رصيدك ومكافآتك؟</p>
        <a href="profile.html" class="nav-btn"><i class="fas fa-user-circle"></i> الانتقال إلى حسابي </a>
    </div>
    <script type="module" src="js/loyalty.js"></script>
</body>
</html>
