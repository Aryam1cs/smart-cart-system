<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدى | بوابة الدخول الموحدة</title>
    <!-- تأكدي من تحديث ملف style.css بالألوان الجديدة كما اتفقنا سابقاً -->
   <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تأكدي من وجود هذه المتغيرات في ملف style.css أو ابقيها هنا لغرض شاشة الدخول */
        :root {
            --brunswick-green: #7A9B65; /* الأخضر الداكن للنصوص */
            --forest-green: #A3C08F; /* اللون الفستقي للوجو والعناصر */
            --peach-soft: #F4F9F1; /* خلفية ناعمة جداً تتناسق مع اللوجو */
            --vivid-red: #D9534F;
            --bg-main: #FFFFFF;
        }

        body { margin: 0; background: var(--bg-main); display: flex; height: 100vh; font-family: 'Cairo'; }
        
        /* تحديث قسم الهوية ليصبح أفتح ويبرز اللوجو */
        .auth-brand { 
            flex: 1; 
            background: #1A4734; /* خلفية فاتحة وناعمة بدل التدرج الغامق */
            color: var(--brunswick-green); /* نصوص غامقة للتباين */
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            border-left: 1px solid #ddd; /* فاصل نحيف */
        }
        
        .auth-form-section { flex: 1; display: flex; justify-content: center; align-items: center; background: white; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 15px;}
        .input-style { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; font-size: 1.1rem; box-sizing: border-box; }
        
        /* تأثير جمالي لزر الدخول */
        .btn-primary {
            background: #1A4734;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #658155; /* تغميق بسيط للزر عند التمرير */
        }
    </style>
</head>
<body>
    <!-- قسم الهوية المحدث باللوجو الجديد -->
    <div class="auth-brand">
        <!-- استخدام اللوجو الجديد (Mada_logo.png) بدل الآيكون القديم -->
        <img src="images/Mada_logo.png" alt="شعار نظام مدى" style="max-height: 140px; margin-bottom: 25px; filter: drop-shadow(0 10px 15px rgba(163, 192, 143, 0.3));">
        
        <h1 style="font-size: 3rem; margin:0; color: #becfab;">نظام <span style="color:  #becfab;">مدى</span></h1>
        <p style="color:#FCFAf5; font-weight: bold; margin-top: 10px; font-size: 1.1rem;">بوابة الدخول الموحدة للموظفين والإدارة</p>
    </div>

    <div class="auth-form-section">
        <div class="auth-card">
            <h2 style="color:  #1A4734; margin-bottom: 25px; text-align: center;"><i class="fas fa-lock"></i> تسجيل الدخول </h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني المؤسسي" class="input-style" required>
                <input type="password" id="loginPassword" placeholder="كلمة المرور" class="input-style" required>
                <button type="submit" class="btn-primary" id="btnLogin" style="width:100%; font-size: 1.2rem; padding: 15px; border-radius: 12px;">دخول آمن للنظام</button>
                <p id="loginError" style="color:var(--vivid-red); margin-top:15px; font-weight:bold; text-align: center;"></p>
            </form>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
